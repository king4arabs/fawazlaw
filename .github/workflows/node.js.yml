# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Frontend (UI-WEB/frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI-WEB/frontend
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: UI-WEB/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run tests
        run: CI=true npm test -- --watchAll=false --passWithNoTests
      - name: Build
        run: CI=true npm run build
      - name: Dependency audit (non-blocking)
        run: npm audit --audit-level=high || true

  api-node:
    name: API-Node syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API-Node
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Dependency audit (non-blocking)
        run: npm audit --audit-level=moderate || true
